    <!-- Dependencies -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,700;0,800;0,900;1,700;1,800;1,900&family=Inter:wght@400;600;700;800;900&family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        /* ============================================================
           1. MANUAL TWEAK: GLOBAL COLORS & SIZES
           ============================================================ */
        :root {
            --neon-teal: #00ffff;
            --neon-purple: #7d2ae8;
            --neon-orange: #ff6a00;
            --bg-dark: #001f1f;
            /* Text Glow Intensity */
            --glow: 0 0 12px rgba(255,255,255,0.4);
            --neon-border: 0 0 20px rgba(0,255,255,0.3);
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background: radial-gradient(circle at 50% 0%, var(--neon-teal) 0%, var(--bg-dark) 100%);
            color: #ffffff;
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
        }
        
        /* Auto-Resolution Controller */
        @media (min-width: 1024px) {
            body { height: 100vh; overflow: hidden; }
            .grid-container {
                display: grid;
                grid-template-columns: repeat(6, 1fr);
                grid-template-rows: repeat(12, minmax(0, 1fr));
                height: 94vh; /* Safe for 14" screens */
                gap: 0.6rem;   /* Reduced gap by half */
                width: 96vw;
                max-width: 1750px;
            }
        }

        @media (max-width: 1023px) {
            .grid-container {
                display: flex;
                flex-direction: column;
                gap: 1rem;
                padding: 1.5rem;
                width: 100%;
            }
            body { overflow-y: auto; height: auto; }
        }

        .font-poppins { font-family: 'Poppins', sans-serif; }
        
        /* Background Technical Grid */
        .grid-lines {
            position: absolute; inset: 0;
            background-image:
                linear-gradient(rgba(255,255,255,0.15) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.15) 1px, transparent 1px);
            background-size: 25px 25px; 
            z-index: 0;
            pointer-events: none;
        }

        @keyframes fall {
            0% { transform: translateY(-50px) rotate(0deg); opacity: 0; }
            20% { opacity: 0.7; }
            80% { opacity: 0.7; }
            100% { transform: translateY(115vh) rotate(360deg); opacity: 0; }
        }
        .animate-fall { animation: fall 12s linear forwards; }

        /* Neon Bento Tile Styling */
        .bento-tile {
            background: linear-gradient(145deg, rgba(255, 255, 255, 0.25), rgba(255, 255, 255, 0.05));
            backdrop-filter: blur(50px);
            -webkit-backdrop-filter: blur(50px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        
        .bento-tile:active, .bento-tile:hover {
            transform: translateY(-5px) scale(1.01);
            border-color: var(--neon-teal);
            box-shadow: var(--neon-border);
            background: linear-gradient(145deg, rgba(255, 255, 255, 0.35), rgba(255, 255, 255, 0.1));
        }

        /* High Visibility Text Intensity */
        .text-intense {
            font-weight: 900;
            text-shadow: var(--glow);
            letter-spacing: -0.01em;
        }

        @keyframes sweep {
            0% { left: -100%; }
            50% { left: 100%; }
            100% { left: 100%; }
        }
        .apply-sweep {
            position: absolute;
            top: 0; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.5), transparent);
            animation: sweep 2.8s infinite;
        }

        .roadmap-interval {
            position: absolute;
            top: -40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: max-content;
            z-index: 50;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="root" class="w-full h-full flex items-center justify-center"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const Icon = ({ name, size = 24, className = "" }) => {
            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            }, [name]);
            return <i data-lucide={name} className={className} style={{ width: size, height: size, display: 'inline-block' }}></i>;
        };

        const TetrisPiece = ({ type, color, left, delay }) => {
            const shapes = {
                I: [[1,1,1,1]], O: [[1,1],[1,1]], T: [[0,1,0],[1,1,1]],
                L: [[1,0],[1,0],[1,1]], J: [[0,1],[0,1],[1,1]],
                S: [[0,1,1],[1,1,0]], Z: [[1,1,0],[0,1,1]]
            };
            const grid = shapes[type] || shapes.I;
            return (
                <div className={`absolute grid gap-1 ${color} animate-fall z-0 opacity-40`} style={{ left, animationDelay: delay }}>
                    {grid.map((row, r) => (
                        <div key={r} className="flex gap-1">
                            {row.map((cell, c) => (
                                <div key={c} className={`w-2 h-2 rounded-sm ${cell ? 'bg-current shadow-[0_0_10px_currentColor]' : 'bg-transparent'}`}></div>
                            ))}
                        </div>
                    ))}
                </div>
            );
        };

        const App = () => {
            const [pieces, setPieces] = useState([]);

            useEffect(() => {
                const types = ['I', 'O', 'T', 'L', 'J', 'S', 'Z'];
                const colors = ['text-cyan-200', 'text-pink-300', 'text-yellow-200', 'text-orange-400'];

                    setPieces(prev => [
                        ...prev.slice(-30),
                        { id: Math.random(), type: types[Math.floor(Math.random() * types.length)], color: colors[Math.floor(Math.random() * colors.length)], left: Math.floor(Math.random() * 95) + '%', delay: '0s' }
                    ]);

                return () => clearInterval(interval);
            }, []);

                    <div className="fixed inset-0 z-0 pointer-events-none overflow-hidden">
                        <div className="grid-lines opacity-50"></div>

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
