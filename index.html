<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aithon 2026 | Strategic One-Pager</title>
    
    <!-- Dependencies -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,700;0,800;0,900;1,700;1,800;1,900&family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background: radial-gradient(circle at 50% 0%, #00f0f0 0%, #005c5c 100%);
            overflow: hidden; 
            height: 100vh;
            color: #ffffff;
            margin: 0;
        }
        .font-poppins { font-family: 'Poppins', sans-serif; }
        .font-space { font-family: 'Space Grotesk', sans-serif; }
        
        .grid-lines {
            position: absolute; inset: 0;
            background-image:
                linear-gradient(rgba(255,255,255,0.08) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.08) 1px, transparent 1px);
            background-size: 45px 45px;
            pointer-events: none;
        }

        @keyframes fall {
            0% { transform: translateY(-100px) rotate(0deg); opacity: 0; }
            10% { opacity: 0.5; }
            90% { opacity: 0.5; }
            100% { transform: translateY(115vh) rotate(360deg); opacity: 0; }
        }
        .animate-fall { animation: fall 18s linear forwards; }

        /* Smaller Tetris Blocks */
        .tetris-block { position: absolute; display: grid; gap: 1px; filter: drop-shadow(0 0 10px currentColor); z-index: 0; }
        .cell { background: currentColor; width: 12px; height: 12px; border-radius: 2px; border: 1px solid rgba(255,255,255,0.1); }

        .bento-tile {
            background: linear-gradient(145deg, rgba(255, 255, 255, 0.16), rgba(255, 255, 255, 0.03));
            backdrop-filter: blur(35px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 30px 60px -15px rgba(0, 0, 0, 0.4);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        
        .bento-tile:hover {
            transform: translateY(-6px) scale(1.008);
            border-color: rgba(34, 211, 238, 0.4);
            background: linear-gradient(145deg, rgba(255, 255, 255, 0.25), rgba(255, 255, 255, 0.06));
            box-shadow: 0 40px 80px -10px rgba(34, 211, 238, 0.2);
        }

        .alert-tile {
            background: linear-gradient(135deg, #e11d48, #fb923c);
            border: 1px solid rgba(255,255,255,0.3);
            transition: all 0.4s ease;
        }
        
        .active-glow {
            box-shadow: 0 0 20px rgba(34, 211, 238, 0.4);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const Icon = ({ name, size = 24, className = "" }) => {
            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            }, [name]);
            return <i data-lucide={name} className={className} style={{ width: size, height: size, display: 'inline-block' }}></i>;
        };

        const TetrisPiece = ({ type, color, left, delay }) => {
            const shapes = {
                I: [[1,1,1,1]], O: [[1,1],[1,1]], T: [[0,1,0],[1,1,1]],
                L: [[1,0],[1,0],[1,1]], J: [[0,1],[0,1],[1,1]],
                S: [[0,1,1],[1,1,0]], Z: [[1,1,0],[0,1,1]]
            };
            const grid = shapes[type] || shapes.I;
            return (
                <div className={`tetris-block ${color} animate-fall`} style={{ left, animationDelay: delay }}>
                    {grid.map((row, r) => (
                        <div key={r} className="flex gap-[1px]">
                            {row.map((cell, c) => (
                                <div key={c} className={`cell ${cell ? 'opacity-100' : 'opacity-0'}`}></div>
                            ))}
                        </div>
                    ))}
                </div>
            );
        };

        const App = () => {
            const [pieces, setPieces] = useState([]);

            useEffect(() => {
                const types = ['I', 'O', 'T', 'L', 'J', 'S', 'Z'];
                const colors = ['text-cyan-200', 'text-pink-300', 'text-purple-300', 'text-orange-300', 'text-emerald-200'];
                const interval = setInterval(() => {
                    setPieces(prev => [
                        ...prev.slice(-18),
                        {
                            id: Math.random(),
                            type: types[Math.floor(Math.random() * types.length)],
                            color: colors[Math.floor(Math.random() * colors.length)],
                            left: Math.floor(Math.random() * 95) + '%',
                            delay: '0s'
                        }
                    ]);
                }, 2000);
                return () => clearInterval(interval);
            }, []);

            return (
                <div className="h-screen w-screen flex items-center justify-center relative p-4 lg:p-8 overflow-hidden">
                    
                    {/* 1. BACKGROUND ENGINE */}
                    <div className="fixed inset-0 z-0">
                        <div className="grid-lines"></div>
                        {pieces.map(p => <TetrisPiece key={p.id} {...p} />)}
                        <div className="absolute top-[-5%] left-[-5%] w-[800px] h-[800px] bg-white/10 blur-[150px] rounded-full"></div>
                    </div>

                    {/* 2. INTERFACE GRID */}
                    <div className="relative z-10 w-full max-w-[1600px] h-full max-h-[880px] grid grid-cols-6 grid-rows-12 gap-4">
                        
                        {/* HERO HUB */}
                        <div className="col-span-2 row-span-4 bento-tile rounded-[48px] p-6 text-center items-center shadow-2xl">
                            <div className="w-36 h-36 mb-2 flex items-center justify-center">
                                <img src="image_a545e0.jpg" alt="Aithon Logo" className="max-h-full max-w-full object-contain filter drop-shadow-xl" />
                            </div>
                            <h1 className="text-5xl font-black font-poppins tracking-tighter italic uppercase leading-none">
                                AITHON <span className="text-cyan-200">2026</span>
                            </h1>
                            <p className="text-[10px] font-black uppercase tracking-[0.6em] text-white/40 mb-4">Enterprise AI Innovation Challenge</p>
                            
                            <div className="flex flex-col gap-2 w-full px-4">
                                <div className="flex gap-2 items-center justify-center bg-black/40 py-2 rounded-xl border border-white/10">
                                    <div className="w-1.5 h-1.5 rounded-full bg-cyan-400 animate-pulse"></div>
                                    <span className="text-[9px] font-black uppercase tracking-widest text-cyan-200">System Live</span>
                                </div>
                                <div className="flex gap-2 items-center justify-center bg-cyan-400 text-black py-1.5 rounded-lg font-black uppercase tracking-[0.2em] shadow-lg" style={{ fontSize: '8px' }}>
                                    <Icon name="globe" size={10} /> 100% ONLINE EVENT
                                </div>
                            </div>
                        </div>

                        {/* APPLY TODAY */}
                        <a href="https://www.cognitoforms.com/HemasTransformation1/AITHON2026OnlineChallengeByHemasHoldingsPLCOfficialTeamRegistration" target="_blank" className="col-span-2 row-span-2 bg-white text-[#008080] rounded-[40px] p-8 flex items-center justify-between group hover:bg-cyan-50 transition-all shadow-2xl">
                            <div className="pl-2">
                                <h2 className="text-4xl font-black font-poppins italic uppercase leading-none tracking-tight">Apply Today</h2>
                                <p className="text-[11px] font-black mt-2 uppercase tracking-widest opacity-40 italic">Portal Closes Mar 15</p>
                            </div>
                            <div className="w-16 h-16 rounded-full border-[3px] border-current flex items-center justify-center group-hover:rotate-45 transition-all">
                                <Icon name="arrow-up-right" size={28} />
                            </div>
                        </a>

                        {/* SPECS & ELIGIBILITY */}
                        <div className="col-span-1 row-span-2 bg-gradient-to-br from-cyan-400/20 to-transparent bento-tile rounded-[40px] p-6 justify-between">
                            <Icon name="users-2" size={32} className="text-cyan-200" />
                            <div>
                                <p className="text-[9px] font-black uppercase tracking-widest text-white/50 mb-1">Squad Size</p>
                                <p className="text-xl font-black uppercase leading-tight italic font-poppins">Max 04<br/>Members</p>
                            </div>
                        </div>

                        <div className="col-span-1 row-span-2 bg-gradient-to-br from-pink-400/20 to-transparent bento-tile rounded-[40px] p-6 justify-between">
                            <Icon name="zap" size={32} className="text-pink-300" />
                            <div>
                                <p className="text-[9px] font-black uppercase tracking-widest text-white/50 mb-1">Eligibility</p>
                                <p className="text-xl font-black uppercase leading-tight italic font-poppins">Open Tech<br/>Access</p>
                            </div>
                        </div>

                        {/* MISSION */}
                        <div className="col-span-2 row-span-2 bento-tile rounded-[40px] p-8">
                            <div className="flex items-center gap-3 mb-3 text-cyan-200">
                                <Icon name="rocket" size={18} />
                                <span className="text-[9px] font-black uppercase tracking-[0.3em]">The Vision</span>
                            </div>
                            <p className="text-[13px] font-semibold leading-relaxed text-white/80 italic tracking-tight font-space">
                                Connecting academic brilliance with Hemas industrial scale to architect the future of strategic intelligence.
                            </p>
                        </div>

                        {/* LIVE ALERT (SMALLER & VISIBLE) */}
                        <div className="col-span-2 row-span-2 alert-tile rounded-[40px] p-6 flex items-center gap-5">
                            <div className="w-14 h-14 bg-white/20 backdrop-blur-md rounded-2xl flex items-center justify-center text-white animate-pulse flex-shrink-0">
                                <Icon name="alert-circle" size={36} />
                            </div>
                            <div className="overflow-hidden">
                                <p className="text-[9px] font-black uppercase tracking-widest text-white/80 mb-1 leading-none flex items-center gap-1">
                                   <span className="w-1.5 h-1.5 bg-white rounded-full animate-ping"></span> Broadcast
                                </p>
                                <p className="text-lg font-black uppercase leading-tight italic font-poppins tracking-tighter text-white">
                                    REGISTRATION LIVE.<br/>JOIN THE BEASTS.
                                </p>
                            </div>
                        </div>

                        {/* STRATEGIC ROADMAP (RESIZED & ACCURATE) */}
                        <div className="col-span-6 row-span-4 bg-gradient-to-br from-white/10 to-[#002222] border border-white/15 rounded-[56px] p-10 flex flex-col justify-center relative shadow-2xl overflow-hidden">
                            <div className="flex items-center justify-between mb-8">
                                <div className="flex items-center gap-6">
                                    <div className="p-2 bg-cyan-400/20 rounded-xl">
                                        <Icon name="activity" className="text-cyan-400" size={24} />
                                    </div>
                                    <h3 className="text-3xl font-black font-poppins italic tracking-tighter uppercase leading-none">Strategic Roadmap 2026</h3>
                                </div>
                                <span className="px-5 py-1.5 bg-cyan-400 text-black rounded-full text-[10px] font-black uppercase tracking-widest shadow-lg">Registration: Active</span>
                            </div>
                            
                            <div className="grid grid-cols-6 gap-6 relative px-4">
                                <div className="absolute top-7 left-12 right-12 h-0.5 bg-white/5 hidden md:block z-0 rounded-full"></div>
                                
                                {/* Label: Proposal Design (Between 2-3) */}
                                <div className="absolute top-[-35px] left-[25%] w-[12%] text-center hidden md:block">
                                    <span className="text-[8px] font-black uppercase tracking-widest text-cyan-200 italic opacity-90">Proposal Design</span>
                                    <div className="h-4 w-px bg-cyan-300 mx-auto opacity-30 mt-1"></div>
                                </div>

                                {/* Label: MVP Dev (Between 4-5) */}
                                <div className="absolute top-[-35px] left-[68%] w-[18%] text-center hidden md:block">
                                    <span className="text-[8px] font-black uppercase tracking-widest text-orange-400 italic opacity-90 whitespace-nowrap">MVP Dev + Pres Prep</span>
                                    <div className="h-4 w-px bg-orange-400 mx-auto opacity-30 mt-1"></div>
                                </div>

                                {[
                                    { d: "MAR 15", t: "Reg Ends", ph: "1", c: "bg-white", s: "Portal Closes" },
                                    { d: "MAR 17", t: "Orientation", ph: "2", c: "bg-white", s: "SBU Briefings" },
                                    { d: "MAR 24", t: "Proposal Sub", ph: "3", c: "bg-white", s: "Concept Lock" },
                                    { d: "MAR 25", t: "Selection", ph: "4", c: "bg-cyan-400 shadow-xl", s: "MVP Invitations" },
                                    { d: "APR 03", t: "MVP Lock", ph: "5", c: "bg-white", s: "Final Submission" },
                                    { d: "APR 05", t: "THE FINALE", ph: "6", c: "bg-orange-500 shadow-xl", s: "Awards Night", active: true }
                                ].map((item, idx) => (
                                    <div key={idx} className="flex flex-col items-start relative z-10 group/step">
                                        <div className={`w-12 h-12 rounded-[18px] border-4 border-[#003333] mb-4 flex items-center justify-center transition-all group-hover/step:scale-110 shadow-xl ${item.c}`}>
                                           <span className={`text-base font-black ${item.active ? 'text-white' : 'text-[#003333]'}`}>{idx+1}</span>
                                        </div>
                                        <div className="pl-1">
                                            <span className="text-[10px] font-black text-white/30 mb-0.5 font-poppins tracking-wider leading-none">{item.d}</span>
                                            <p className="text-[14px] font-black uppercase text-white mb-0.5 leading-none tracking-tighter">{item.t}</p>
                                            <p className="text-[8px] font-bold text-white/20 uppercase tracking-widest leading-none">{item.s}</p>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>

                        {/* CHALLENGE TRACKS (SPECIFIC TITLES) */}
                        <div className="col-span-4 row-span-4 flex flex-col py-2">
                             <div className="flex items-center gap-6 mb-4 px-2">
                                <h3 className="text-[11px] font-black uppercase tracking-[0.8em] text-white/30 italic font-poppins whitespace-nowrap">Challenge Tracks</h3>
                                <div className="h-px bg-white/10 flex-grow shadow-[0_0_10px_white]"></div>
                            </div>
                            <div className="grid grid-cols-3 gap-4 flex-grow">
                                {[
                                  { title: "Analytics & Consumer Intelligence", sub: "Predictive Insight", icon: "bar-chart-3", from: "from-cyan-400/40", to: "to-cyan-900/60", b: "border-cyan-400/40" },
                                  { title: "D2D Corporate Use Cases", sub: "Enterprise Automation", icon: "cpu", from: "from-pink-400/40", to: "to-pink-900/60", b: "border-pink-400/40" },
                                  { title: "AI Without Limits (Open Arena)", sub: "Bold Innovation", icon: "globe", from: "from-purple-400/40", to: "to-purple-900/60", b: "border-purple-400/40" }
                                ].map((track, i) => (
                                  <div key={i} className={`bg-gradient-to-br ${track.from} ${track.to} backdrop-blur-3xl border ${track.b} rounded-[40px] p-6 flex flex-col justify-between hover:scale-[1.04] transition-all group`}>
                                      <Icon name={track.icon} size={36} className="text-white opacity-80" />
                                      <div>
                                          <h3 className="text-[18px] font-black font-poppins uppercase text-white leading-tight italic tracking-tighter">{track.title}</h3>
                                          <p className="text-[9px] font-black uppercase tracking-widest mt-2 text-white/40 leading-none">{track.sub}</p>
                                      </div>
                                  </div>
                                ))}
                            </div>
                        </div>

                        {/* VAULT */}
                        <div className="col-span-2 row-span-2 bg-gradient-to-br from-[#7000FF] to-[#3A00AA] bento-tile rounded-[40px] p-8 flex items-center justify-between border-2 border-white/30 shadow-[0_20px_50px_rgba(112,0,255,0.3)]">
                            <div>
                                <p className="text-[9px] font-black uppercase tracking-widest text-white/60 mb-1 leading-none">Resource Hub</p>
                                <h3 className="text-3xl font-black font-poppins uppercase italic leading-none tracking-tighter text-white">Vault</h3>
                            </div>
                            <div className="flex flex-col gap-3">
                                <button className="w-12 h-12 bg-white/20 backdrop-blur-md rounded-2xl flex items-center justify-center hover:bg-white hover:text-purple-600 transition-all border border-white/20 shadow-xl group/btn">
                                    <Icon name="download" size={24} className="group-hover/btn:translate-y-1 transition-transform" />
                                </button>
                                <button className="w-12 h-12 bg-white/20 backdrop-blur-md rounded-2xl flex items-center justify-center hover:bg-white hover:text-purple-600 transition-all border border-white/20 shadow-xl">
                                    <Icon name="file-text" size={24} />
                                </button>
                            </div>
                        </div>

                        {/* CONTACT */}
                        <div className="col-span-2 row-span-2 bento-tile rounded-[40px] p-8">
                            <div className="flex items-center gap-8 border-b border-white/10 pb-5 mb-5">
                                <div className="flex gap-3">
                                    <a href="mailto:aithon@hemas.com" className="w-12 h-12 rounded-[18px] bg-white/10 flex items-center justify-center hover:bg-white hover:text-[#008080] transition-all border border-white/10 shadow-lg"><Icon name="mail" size={22} /></a>
                                    <a href="https://linkedin.com" target="_blank" className="w-12 h-12 rounded-[18px] bg-white/10 flex items-center justify-center hover:bg-[#0077b5] transition-all border border-white/10 shadow-lg"><Icon name="linkedin" size={22} /></a>
                                </div>
                                <div className="flex flex-col">
                                    <p className="text-[9px] font-black text-white/40 uppercase tracking-widest mb-1 leading-none">Inquiries</p>
                                    <p className="text-[14px] font-black tracking-tight text-cyan-200 font-poppins">+94 77 7175 285</p>
                                </div>
                            </div>
                            <p className="text-[9px] font-black uppercase tracking-[0.8em] text-white/15 text-center leading-none italic">Defining the Strategic Pulse</p>
                        </div>

                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
